__include__: [
  '../dataset/custom_detection.yml',
  '../runtime.yml',
  '../base/dataloader.yml',
  '../base/optimizer.yml',
  '../base/dfine_hgnetv2.yml',
  '../base/rtv4.yml'
]

output_dir: ./outputs/rtv4_hgnetv2_s_cotton_teacher_allmods
summary_dir: ./outputs/rtv4_hgnetv2_s_cotton_teacher_allmods/tensorboard

num_classes: 21
remap_mscoco_category: False

teacher_model:
  type: "DINOv3TeacherModel"
  dinov3_repo_path: dinov3/
  dinov3_weights_path: pretrain/dinov3_vitb16_pretrain_lvd1689m.pth
  dinov3_model_type: "dinov3_vitb16"
  patch_size: 16
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

HGNetv2:
  name: 'B0'
  return_idx: [1, 2, 3]
  freeze_at: -1
  freeze_norm: False
  use_lab: True
  pretrained: True
  local_model_dir: ./pretrain/hgnetv2/

HybridEncoder:
  in_channels: [256, 512, 1024]
  hidden_dim: 256
  depth_mult: 0.34
  expansion: 0.5
  distill_teacher_dim: 768
  ifpn_upsample_mode: bilinear
  edge_enhance: False
  edge_enhance_alpha: 0.15
  edge_threshold_ratio: 0.2
  prewitt_franklin_enhance: True
  prewitt_franklin_alpha: 0.15
  small_lesion_enhance: False
  small_lesion_alpha: 0.15
  attention_enhance: False
  attention_alpha: 0.15
  background_suppression: False
  background_alpha: 0.10
  output_refine: False
  output_refine_alpha: 0.10
  weighted_fusion: False
  coordinate_attention: False
  coordinate_attention_alpha: 0.12
  high_frequency_enhance: False
  high_frequency_alpha: 0.10
  global_context: False
  global_context_alpha: 0.10

DFINETransformer:
  num_layers: 3
  eval_idx: -1
epoches: 120
flat_epoch: 120
no_aug_epoch: 20
checkpoint_freq: 1
print_freq: 50
use_amp: True
use_ema: True
sync_bn: False

optimizer:
  type: AdamW
  params:
    -
      params: '^(?=.*backbone)(?!.*norm|bn).*$'
      lr: 0.0001
    -
      params: '^(?=.*backbone)(?=.*norm|bn).*$'
      lr: 0.0001
      weight_decay: 0.
    -
      params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn|bias)).*$'
      weight_decay: 0.
  lr: 0.0002
  betas: [0.9, 0.999]
  weight_decay: 0.0001

RTv4Criterion:
  weight_dict: {loss_mal: 1, loss_bbox: 5, loss_giou: 2, loss_fgl: 0.15, loss_ddf: 1.5, loss_distill: 5}
  losses: ['mal', 'boxes', 'local', 'distill']
  gamma: 1.5
  reg_max: 32
  distill_adaptive_params:
    enabled: True
    rho: 11
    delta: 1
    default_weight: 20
  matcher:
    type: HungarianMatcher
    weight_dict: {cost_class: 2, cost_bbox: 5, cost_giou: 2}
    alpha: 0.25
    gamma: 2.0

train_dataloader:
  dataset:
    img_folder: ./data/cotton_rtdetr_dataset/images/train
    ann_file: ./data/cotton_coco_zero_based/annotations/instances_train.json
    transforms:
      policy:
        epoch: [4, 29, 45]
  total_batch_size: 16
  num_workers: 0
  drop_last: True
  collate_fn:
    base_size: 640
    base_size_repeat: 3
    mixup_epochs: [4, 29]
    stop_epoch: 45

val_dataloader:
  dataset:
    img_folder: ./data/cotton_rtdetr_dataset/images/val
    ann_file: ./data/cotton_coco_zero_based/annotations/instances_val.json
  total_batch_size: 32
  num_workers: 0
  drop_last: False



