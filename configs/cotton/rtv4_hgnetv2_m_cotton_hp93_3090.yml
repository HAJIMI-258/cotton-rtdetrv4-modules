
__include__: [
  '../dataset/custom_detection.yml',
  '../runtime.yml',
  '../base/dataloader.yml',
  '../base/optimizer.yml',
  '../base/dfine_hgnetv2.yml',
  '../base/rtv4.yml'
]

# High-precision single RTX 3090 candidate.
# Goal: first produce a strong final model, then run ablations around it.
output_dir: ./outputs/rtv4_hgnetv2_m_cotton_hp93_3090
summary_dir: ./outputs/rtv4_hgnetv2_m_cotton_hp93_3090/tensorboard

num_classes: 21
remap_mscoco_category: False

eval_spatial_size: [704, 704]

teacher_model:
  type: "DINOv3TeacherModel"
  dinov3_repo_path: dinov3/
  dinov3_weights_path: pretrain/dinov3_vitb16_pretrain_lvd1689m.pth
  dinov3_model_type: "dinov3_vitb16"
  patch_size: 16
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

RTv4:
  backbone: HGNetv2
  encoder: HybridEncoder
  decoder: DFINETransformer

HGNetv2:
  name: 'B2'
  return_idx: [1, 2, 3]
  freeze_at: -1
  freeze_norm: False
  use_lab: True
  pretrained: True
  local_model_dir: ./pretrain/hgnetv2/

HybridEncoder:
  in_channels: [384, 768, 1536]
  feat_strides: [8, 16, 32]
  hidden_dim: 256
  depth_mult: 0.67
  expansion: 0.5
  use_encoder_idx: [2]
  num_encoder_layers: 1
  nhead: 8
  dim_feedforward: 1024
  dropout: 0.
  enc_act: 'gelu'
  act: 'silu'
  distill_teacher_dim: 768

  # Keep only high-probability modules. Avoid the previous all-module pile-up.
  ifpn_upsample_mode: bilinear
  edge_enhance: False
  prewitt_franklin_enhance: True
  prewitt_franklin_alpha: 0.10
  edge_threshold_ratio: 0.2

  small_lesion_enhance: True
  small_lesion_alpha: 0.08
  output_refine: True
  output_refine_alpha: 0.06

  carafe_upsample: True
  carafe_compressed_channels: 32
  carafe_kernel_size: 3
  bifpn_fusion: True

  # Use light attention only; CBAM+LSK+RepVGG+PConv together often overfits small custom datasets.
  coord_attention_exact: True
  coordinate_attention_alpha: 0.08
  eca_attention: True
  eca_alpha: 0.06
  cbam_attention: False
  lsk_attention: False
  fasternet_pconv: False
  repvgg_enhance: False
  gather_distribute: False

  # Let added modules actually learn, but keep the residual contribution bounded.
  safe_module_init_scale: 0.01
  safe_module_trainable_scale: True
  safe_module_max_scale: 0.05

DFINETransformer:
  feat_channels: [256, 256, 256]
  feat_strides: [8, 16, 32]
  hidden_dim: 256
  num_levels: 3
  num_layers: 4
  eval_idx: -1
  num_queries: 300
  num_denoising: 100
  label_noise_ratio: 0.5
  box_noise_scale: 1.0
  reg_max: 32
  reg_scale: 4
  layer_scale: 1
  num_points: [3, 6, 3]
  cross_attn_method: default
  query_select_method: default
  activation: silu
  mlp_act: silu

PostProcessor:
  num_top_queries: 300

# Single 3090: real batch 4, accumulated 4 -> effective batch 16.
# If CUDA OOM, set total_batch_size to 2 and accumulation_steps to 8.
accumulation_steps: 4

epoches: 120
flat_epoch: 60
no_aug_epoch: 20
checkpoint_freq: 2
print_freq: 50
use_amp: True
use_ema: True
sync_bn: False
find_unused_parameters: False
clip_max_norm: 0.1

ema:
  type: ModelEMA
  decay: 0.9998
  warmups: 1000
  start: 0

optimizer:
  type: AdamW
  params:
    -
      params: '^(?=.*backbone)(?!.*norm|bn).*$'
      lr: 0.000012
    -
      params: '^(?=.*backbone)(?=.*norm|bn).*$'
      lr: 0.000012
      weight_decay: 0.
    -
      params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn|bias)).*$'
      weight_decay: 0.
  lr: 0.00012
  betas: [0.9, 0.999]
  weight_decay: 0.0001

RTv4Criterion:
  weight_dict: {loss_mal: 1, loss_bbox: 5, loss_giou: 2, loss_nwd: 0.15, loss_fgl: 0.15, loss_ddf: 1.5, loss_distill: 2.0}
  losses: ['mal', 'boxes', 'local', 'distill']
  gamma: 1.5
  reg_max: 32
  nwd_normalizer: 1.0
  nwd_eps: 1.0e-7
  hdps_class_union: False
  distill_adaptive_params:
    enabled: False
    foreground_focus: True
    fg_weight: 1.0
    bg_weight: 0.03
    box_scale: 1.8
    min_fg_pixels: 4
  matcher:
    type: HungarianMatcher
    weight_dict: {cost_class: 2, cost_bbox: 5, cost_giou: 2}
    alpha: 0.25
    gamma: 2.0

train_dataloader:
  dataset:
    img_folder: ./data/cotton_rtdetr_dataset/images/train
    ann_file: ./data/cotton_coco_zero_based/annotations/instances_train.json
    transforms:
      ops:
        - {type: Mosaic, output_size: 352, rotation_range: 8, translation_range: [0.08, 0.08], scaling_range: [0.6, 1.4], probability: 1.0, fill_value: 0, use_cache: False, max_cached_images: 50, random_pop: True}
        - {type: RandomPhotometricDistort, p: 0.5}
        - {type: RandomZoomOut, fill: 0}
        - {type: RandomIoUCrop, p: 0.5}
        - {type: SanitizeBoundingBoxes, min_size: 1}
        - {type: RandomHorizontalFlip}
        - {type: Resize, size: [704, 704]}
        - {type: SanitizeBoundingBoxes, min_size: 1}
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
        - {type: ConvertBoxes, fmt: 'cxcywh', normalize: True}
      policy:
        epoch: [4, 45, 120]
        ops: ['Mosaic', 'RandomPhotometricDistort', 'RandomZoomOut', 'RandomIoUCrop']
      mosaic_prob: 0.4
  shuffle: True
  total_batch_size: 4
  num_workers: 4
  drop_last: True
  collate_fn:
    type: BatchImageCollateFunction
    base_size: 704
    base_size_repeat: 3
    mixup_prob: 0.2
    mixup_epochs: [4, 45]
    stop_epoch: 120
    ema_restart_decay: 0.9998

val_dataloader:
  dataset:
    img_folder: ./data/cotton_rtdetr_dataset/images/val
    ann_file: ./data/cotton_coco_zero_based/annotations/instances_val.json
    transforms:
      ops:
        - {type: Resize, size: [704, 704]}
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
  shuffle: False
  total_batch_size: 8
  num_workers: 4
  drop_last: False
